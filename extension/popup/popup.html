<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusGuard</title>
  <link rel="stylesheet" href="../assets/styles-common.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="popup-logo">
        <span class="logo-icon">🛡️</span>
        <h1>FocusGuard</h1>
      </div>
      <div class="header-actions">
        <button id="btn-dashboard" class="icon-btn" title="Open Dashboard">📊</button>
      </div>
    </header>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Active Time</span>
        <span class="stat-value" id="stat-active">0h 0m</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Focus %</span>
        <span class="stat-value focus-color" id="stat-focus">0%</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="stat-score">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Streak</span>
        <span class="stat-value streak-color" id="stat-streak">🔥 0</span>
      </div>
    </div>

    <!-- Top Domains -->
    <section class="section">
      <h2 class="section-title">Top Sites Today</h2>
      <div id="domain-bars" class="domain-bars"></div>
    </section>

    <!-- Focus Mode -->
    <section class="section">
      <h2 class="section-title">Focus Mode</h2>
      <div id="focus-inactive" class="focus-controls">
        <div class="duration-selector">
          <button class="dur-btn" data-dur="15">15m</button>
          <button class="dur-btn active" data-dur="25">25m</button>
          <button class="dur-btn" data-dur="45">45m</button>
          <button class="dur-btn" data-dur="60">60m</button>
        </div>
        <button id="btn-start-focus" class="btn-primary">▶ Start Focus</button>
      </div>
      <div id="focus-active" class="focus-active" style="display:none;">
        <div class="focus-timer" id="focus-timer">25:00</div>
        <div class="focus-actions">
          <button id="btn-pause-focus" class="btn-secondary">⏸ Pause</button>
          <button id="btn-stop-focus" class="btn-danger">⏹ Stop</button>
        </div>
      </div>
    </section>

    <!-- Quick Block -->
    <section class="section">
      <button id="btn-block-current" class="btn-block">🚫 Block Current Site</button>
    </section>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="../utils/categories.js"></script>
  <script src="../utils/scoring.js"></script>
  <script src="popup.js"></script>
</body>
</html>
