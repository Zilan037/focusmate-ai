<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusGuard</title>
  <script>
    (async()=>{try{const{focusguard_theme:t}=await chrome.storage.local.get("focusguard_theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();
  </script>
  <link rel="stylesheet" href="../assets/styles-common.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-bg"></div>
  <div class="popup-container">
    <!-- Ticker -->
    <div class="ticker fade-up">
      <div class="ticker-track" id="ticker-track">
        <span class="ticker-item" id="ticker-content">Loading stats...</span>
      </div>
    </div>

    <!-- Header -->
    <header class="popup-header fade-up">
      <div class="popup-logo">
        <svg class="shield-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="url(#shieldGrad)" opacity="0.2"/>
          <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="url(#shieldGrad)" stroke-width="1.5" fill="none"/>
          <path d="M9 12l2 2 4-4" stroke="#5B8CFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="shieldGrad" x1="3" y1="2" x2="21" y2="24">
              <stop offset="0%" stop-color="#5B8CFF"/>
              <stop offset="100%" stop-color="#7C6AFF"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="text-gradient">FocusGuard</h1>
      </div>
      <div class="header-actions">
        <div id="streak-badge" class="streak-badge">
          <span class="streak-fire">🔥</span>
          <span id="streak-count" class="streak-count">0</span>
        </div>
        <button id="btn-theme" class="theme-toggle" title="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.3 3.3l1.4 1.4M11.3 11.3l1.4 1.4M3.3 12.7l1.4-1.4M11.3 4.7l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 8.5a5.5 5.5 0 01-6-6A5.5 5.5 0 108 14a5.5 5.5 0 005.5-5.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-dashboard" class="header-btn" title="Dashboard">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </header>

    <!-- Score Hero Card -->
    <div class="score-hero glass-card fade-up delay-1">
      <div class="score-ring-container">
        <svg class="score-ring-svg" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#5B8CFF"/>
              <stop offset="50%" stop-color="#7C6AFF"/>
              <stop offset="100%" stop-color="#34D399"/>
            </linearGradient>
          </defs>
          <circle class="score-ring-bg" cx="50" cy="50" r="42" />
          <circle class="score-ring-fill" id="score-ring" cx="50" cy="50" r="42" 
            stroke-dasharray="264" stroke-dashoffset="264" />
        </svg>
        <div class="score-inner">
          <span class="score-number" id="stat-score">0</span>
          <span class="score-label" id="score-label">—</span>
        </div>
      </div>
      <div class="score-stats">
        <div class="score-stat-pill">
          <span class="score-stat-dot" style="background:var(--accent)"></span>
          <span class="score-stat-label">Focus</span>
          <span class="score-stat-value" id="stat-focus-time">0h 0m</span>
        </div>
        <div class="score-stat-pill">
          <span class="score-stat-dot" style="background:var(--danger)"></span>
          <span class="score-stat-label">Distracted</span>
          <span class="score-stat-value" id="stat-distracted">0h 0m</span>
        </div>
        <div class="score-stat-pill">
          <span class="score-stat-dot" style="background:var(--success)"></span>
          <span class="score-stat-label">Active</span>
          <span class="score-stat-value" id="stat-active">0h 0m</span>
        </div>
      </div>
    </div>

    <!-- Daily Goal Progress -->
    <div class="goal-progress glass-card fade-up delay-1" id="goal-section">
      <div class="goal-header">
        <span class="goal-icon">🎯</span>
        <span class="goal-title">Daily Goal</span>
        <span class="goal-streak-badge" id="goal-streak">0 day streak</span>
      </div>
      <div class="goal-bar-wrap">
        <div class="goal-bar-fill" id="goal-bar" style="width:0%"></div>
      </div>
      <div class="goal-meta">
        <span id="goal-progress-text">0h / 4h focused</span>
        <span id="goal-pct">0%</span>
      </div>
    </div>

    <!-- Insight Card -->
    <div class="insight-card glass-card fade-up delay-2" id="insight-card">
      <span class="insight-icon" id="insight-icon">💡</span>
      <span class="insight-text" id="insight-text">Loading insight...</span>
    </div>

    <!-- Focus Mode -->
    <section class="section fade-up delay-3">
      <h2 class="section-title">Focus Mode</h2>
      <div id="focus-inactive" class="focus-controls">
        <!-- Task input -->
        <div class="focus-task-input">
          <input type="text" id="focus-tasks" class="input" placeholder="Tasks (comma separated)..." />
        </div>
        <div class="duration-selector">
          <div class="dur-track">
            <div class="dur-highlight" id="dur-highlight"></div>
            <button class="dur-btn" data-dur="15">15m</button>
            <button class="dur-btn active" data-dur="25">25m</button>
            <button class="dur-btn" data-dur="45">45m</button>
            <button class="dur-btn" data-dur="60">60m</button>
          </div>
        </div>
        <button id="btn-start-focus" class="btn-focus-start">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><polygon points="3,1 14,8 3,15"/></svg>
          Start Focus
        </button>
      </div>
      <div id="focus-active" class="focus-active" style="display:none;">
        <div class="focus-timer-wrap">
          <svg class="focus-ring" viewBox="0 0 100 100">
            <circle class="focus-ring-bg" cx="50" cy="50" r="42" />
            <circle class="focus-ring-fill" id="focus-ring" cx="50" cy="50" r="42" 
              stroke-dasharray="264" stroke-dashoffset="0" />
          </svg>
          <div class="focus-timer" id="focus-timer">25:00</div>
        </div>
        <!-- Task checklist during focus -->
        <div class="focus-tasks-list" id="focus-tasks-list"></div>
        <div class="focus-session-meta">
          <span class="pomodoro-count" id="pomodoro-count">🍅 0</span>
          <span class="focus-status-label" id="focus-status-label">Focusing</span>
        </div>
        <div class="focus-actions">
          <button id="btn-pause-focus" class="btn-focus-action">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="1" width="3.5" height="12" rx="1"/><rect x="8.5" y="1" width="3.5" height="12" rx="1"/></svg>
          </button>
          <button id="btn-stop-focus" class="btn-focus-action btn-focus-stop">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="2"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Top Sites -->
    <section class="section fade-up delay-4">
      <h2 class="section-title">Top Sites</h2>
      <div id="domain-bars" class="domain-bars">
        <!-- Skeleton loading -->
        <div class="skeleton-row"><div class="skeleton" style="width:24px;height:24px;border-radius:6px;"></div><div style="flex:1;"><div class="skeleton skeleton-text" style="width:60%;margin-bottom:4px;"></div><div class="skeleton" style="height:4px;width:80%;border-radius:2px;"></div></div></div>
        <div class="skeleton-row"><div class="skeleton" style="width:24px;height:24px;border-radius:6px;"></div><div style="flex:1;"><div class="skeleton skeleton-text" style="width:45%;margin-bottom:4px;"></div><div class="skeleton" style="height:4px;width:55%;border-radius:2px;"></div></div></div>
        <div class="skeleton-row"><div class="skeleton" style="width:24px;height:24px;border-radius:6px;"></div><div style="flex:1;"><div class="skeleton skeleton-text" style="width:35%;margin-bottom:4px;"></div><div class="skeleton" style="height:4px;width:40%;border-radius:2px;"></div></div></div>
      </div>
    </section>

    <!-- Quick Actions -->
    <div class="quick-actions fade-up delay-5">
      <button id="btn-block-current" class="btn-action-glass btn-action-danger">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/><line x1="3.5" y1="3.5" x2="10.5" y2="10.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Block Site
      </button>
      <button id="btn-dashboard-bottom" class="btn-action-glass">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 11V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5 11V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 11V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 11V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Dashboard
      </button>
    </div>

    <!-- Keyboard Shortcuts Hint -->
    <div class="shortcuts-hint fade-up delay-6">
      <span class="shortcut-key">Alt+Shift+F</span> Focus
      <span class="shortcut-sep">·</span>
      <span class="shortcut-key">Alt+Shift+B</span> Block
    </div>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="../utils/categories.js"></script>
  <script src="../utils/scoring.js"></script>
  <script src="popup.js"></script>
</body>
</html>
